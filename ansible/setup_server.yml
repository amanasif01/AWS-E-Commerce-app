---
- name: Configure EC2 Instance for Microservices
  hosts: boutique_servers
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - python3-pip
        state: present

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Ensure Docker is started and enabled
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Install MicroK8s via snap
      snap:
        name: microk8s
        classic: yes
        channel: 1.28/stable

    - name: Wait for MicroK8s to be ready
      command: microk8s status --wait-ready
      register: mk8s_status
      changed_when: false

    - name: Add ubuntu user to microk8s group
      user:
        name: ubuntu
        groups: microk8s
        append: yes

    - name: Change ownership of .kube directory
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        recurse: yes

    - name: Enable MicroK8s addons
      command: "microk8s enable dns ingress"
      changed_when: false

    - name: Create alias for kubectl
      lineinfile:
        path: /home/ubuntu/.bashrc
        line: "alias kubectl='microk8s kubectl'"
        state: present
